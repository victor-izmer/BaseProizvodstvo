main.datasource.url = jdbc:postgresql://localhost:5432/Base6
main.datasource.username = postgres
main.datasource.password =root

main.liquibase.change-log=com/company/base6/liquibase/changelog.xml

hibernate.cache.use_second_level_cache=true
hibernate.cache.region.factory_class=org.hibernate.cache.ehcache.EhCacheRegionFactory
spring.jpa.entity-scan.base-packages=com.company.base6.entity

jmix.ui.login-view-id = LoginView
jmix.ui.main-view-id = MainView
jmix.ui.menu-config = com/company/base6/menu.xml
jmix.ui.composite-menu = true

ui.login.defaultUsername = admin
ui.login.defaultPassword = admin

jmix.core.available-locales = ru

# Launch the default browser when starting the application in development mode
vaadin.launch-browser = false

# Use pnpm to speed up project initialization and save disk space
vaadin.pnpm.enable = true

logging.level.org.atmosphere = warn

# 'debug' level logs SQL generated by EclipseLink ORM
# logging.level.eclipselink.logging.sql = info

# 'debug' level logs data store operations
logging.level.io.jmix.core.datastore = info

# 'debug' level logs access control constraints
logging.level.io.jmix.core.AccessLogger = debug

# 'debug' level logs all Jmix debug output
logging.level.io.jmix = info

# 'debug' or 'trace' levels help to troubleshoot security problems
logging.level.org.springframework.security = info

app.photo.storage-path=classpath:/photos
jmix.core.photoDir = photos/
jmix.core.fileStorage.implementation = fs

# component to select app_MyEntity (should implement EntityPicker)
jmix.ui.entityFieldType.app_MyEntity = entityComboBox
# what actions to add to the app_MyEntity selection component
jmix.ui.entityFieldActions.app_MyEntity = entity_lookup, entity_open, entity_clear

spring.web.resources.static-locations=classpath:/META-INF/resources/
logging.level.org.springframework.web=DEBUG
logging.level.com.company.base6=TRACE

jmix.ui.view.save-shortcut=Control-Enter
jmix.ui.view.close-shortcut=Escape

jmix.core.default-file-storage=fs